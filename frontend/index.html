<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparador de Preços</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Compare os Melhores Preços</h1>
        <p>Pesquise produtos e veja onde estão mais baratos.</p>
      </div>
    </header>

    <section class="card search-card">
      <h2>Pesquisar Produto</h2>
      <div class="input-row">
        <input id="produtoBusca" type="text" placeholder="Digite o nome do produto..." />
        <button id="btnComparar">Comparar Preços</button>
      </div>
      <div id="mensagemBusca" class="mensagem"></div>
    </section>

    <section class="card resultado-card">
      <h2>Resultados da Comparação</h2>
      <div id="resultadoComparacao" class="resultado-lista">
        <p>Use a pesquisa para comparar preços de um produto.</p>
      </div>
    </section>

    <section class="card form-card">
      <h2>Adicionar / Editar Produto</h2>
      <form id="formPreco">
        <div class="input-group">
          <label for="produtoNome">Nome do Produto</label>
          <input id="produtoNome" name="produto" type="text" placeholder="Nome do Produto" />
        </div>
        <div class="input-group">
          <label for="lojaNome">Nome da Loja</label>
          <input id="lojaNome" name="loja" type="text" placeholder="Nome da Loja" />
        </div>
        <div class="input-group">
          <label for="precoValor">Preço (R$)</label>
          <input id="precoValor" name="valor" type="number" min="0" step="0.01" placeholder="Preço" />
        </div>
        <div class="form-actions">
          <button type="submit" id="btnSalvar">Salvar</button>
          <button type="button" id="btnCancelar" class="secondary">Cancelar</button>
        </div>
        <div id="mensagemFormulario" class="mensagem"></div>
      </form>
    </section>

    <section class="card tabela-card">
      <div class="table-header">
        <h2>Produtos e Preços Cadastrados</h2>
        <span id="totalRegistros">0 registros</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Loja</th>
              <th>Preço (R$)</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="precosTabela"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>

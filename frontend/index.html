<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ContaCerta — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="cart-emoji" aria-hidden="true">🛍️</div>
        <h1 class="logo"><span class="blue">Conta</span><span class="green">Certa</span></h1>
      </div>
      <nav>
        <button class="btn btn-green add-product">+ Adicionar Produto</button>
      </nav>
    </div>
  </header>

  <main class="container main-hero">
    <section class="hero">
      <h2 class="hero-title"><span class="blue">Conta</span><span class="green">CERTA</span></h2>
      <div class="search-row">
        <input id="q" class="search-input" placeholder="Digite o nome do produto" aria-label="Pesquisar produto">
        <button id="searchBtn" class="btn btn-green search-btn">Pesquisar</button>
      </div>
      <p class="hero-sub">Compare preços entre mercados e economize na sua conta.</p>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>

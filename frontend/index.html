<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparador de Preços</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-root">
    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>
      <div class="topbar-title">
        <h1>Comparador de Preços</h1>
        <p class="muted">Compare produtos entre lojas</p>
      </div>
      <nav class="nav">
        <button data-view="home" class="nav-link">Início</button>
        <button data-view="results" class="nav-link">Resultados</button>
        <button data-view="add" class="nav-link">Adicionar</button>
      </nav>
    </header>

    <div class="views">
      <!-- Tela Inicial -->
      <section id="view-home" class="view">
        <div class="card center-card">
          <h2>Compare os Melhores Preços</h2>
          <p class="muted">Digite o nome do produto e compare.</p>
          <div class="input-row">
            <input id="produtoBusca" type="text" placeholder="Digite o nome do produto..." />
            <button id="btnComparar">Comparar Preços</button>
          </div>
          <div class="links-row">
            <button class="link" data-view="add">Adicionar Produto / Preço</button>
          </div>
          <div id="mensagemBusca" class="mensagem"></div>
        </div>
      </section>

      <!-- Tela de Resultados -->
      <section id="view-results" class="view" style="display:none;">
        <div class="card center-card">
          <h2>Melhores Ofertas Encontradas!</h2>
          <div id="resultadoComparacao" class="resultado-lista">
            <p>Use a pesquisa para comparar preços de um produto.</p>
          </div>
          <div class="actions-row">
            <button data-view="add">Adicionar Novo Produto / Preço</button>
            <button data-view="home" class="secondary">Voltar</button>
          </div>
        </div>
      </section>

      <!-- Tela de Adição/Edição -->
      <section id="view-add" class="view" style="display:none;">
        <div class="card center-card">
          <h2 id="formTitle">Adicionar Novo Produto</h2>
          <form id="formPreco">
            <div class="input-group">
              <label for="produtoNome">Nome do Produto</label>
              <input id="produtoNome" name="produto" type="text" placeholder="Nome do Produto" />
            </div>
            <div class="input-group">
              <label for="lojaNome">Nome da Loja</label>
              <input id="lojaNome" name="loja" type="text" placeholder="Nome da Loja" />
            </div>
            <div class="input-group">
              <label for="precoValor">Preço (R$)</label>
              <input id="precoValor" name="valor" type="number" min="0" step="0.01" placeholder="Preço" />
            </div>
            <div class="form-actions">
              <button type="submit" id="btnSalvar">Salvar</button>
              <button type="button" id="btnCancelar" class="secondary">Cancelar</button>
            </div>
            <div id="mensagemFormulario" class="mensagem"></div>
          </form>
        </div>
      </section>
    </div>

    <section class="card tabela-card">
      <div class="table-header">
        <h2>Produtos e Preços Cadastrados</h2>
        <span id="totalRegistros">0 registros</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Loja</th>
              <th>Preço (R$)</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="precosTabela"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>

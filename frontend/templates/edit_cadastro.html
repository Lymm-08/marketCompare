{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Editar cadastro</h2>
        <form method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nome do produto</label>
              <input class="form-control" name="name" value="{{ product.name }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Marca</label>
              <input class="form-control" name="brand" value="{{ product.brand }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Categoria</label>
              <input class="form-control" name="category" value="{{ product.category }}" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Mercado</label>
              <input class="form-control" name="market_name" value="{{ market.name }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Endereço</label>
              <input class="form-control" name="address" value="{{ market.address }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Cidade</label>
              <input class="form-control" name="city" value="{{ market.city }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Preço</label>
              <input class="form-control" type="number" step="0.01" name="price" value="{{ price.price }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Imagem (URL)</label>
              <input class="form-control" name="image_url" value="{{ product.image_url or '' }}" />
            </div>
          </div>
          <button class="btn btn-success mt-4" type="submit">Atualizar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

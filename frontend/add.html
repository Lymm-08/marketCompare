<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ContaCerta — Adicionar Produto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <svg class="cart" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 4h-2l-1 2v2h2l3.6 7.59-1.35 2.44C8.89 18.53 9.5 20 11 20h8v-2h-8l1.1-2h5.9c.78 0 1.46-.45 1.79-1.14l3.58-8.86-1.73-.69L20.42 13H11.21L9.27 8H7V4z" fill="#1565C0"/></svg>
        <h1 class="logo"><span class="blue">Conta</span><span class="green">Certa</span></h1>
      </div>
      <nav>
        <button class="btn btn-green" id="listBtn">Gerenciar</button>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <h2>Adicionar Produto</h2>
    <form id="addForm" class="card form-card">
      <label>Nome do Produto <input name="nome_produto" required></label>
      <label>Nome do Mercado <input name="nome_mercado" required></label>
      <label>Endereço do Mercado <input name="endereco" required></label>
      <label>Preço <input name="preco" type="number" step="0.01" required></label>
      <div class="form-actions">
        <button type="submit" class="btn btn-green large">Salvar</button>
      </div>
    </form>
  </main>

  <script src="js/add.js"></script>
</body>
</html>

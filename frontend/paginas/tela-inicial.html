<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tela Inicial</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="proto-bg">
  <div class="device-frame">
    <main class="mobile-frame">
      <header class="mobile-top">
        <div class="icon">☰</div>
        <div class="icon">✉</div>
      </header>

      <section class="mobile-card">
        <h2>Compare os Melhores Preços!</h2>
        <div class="input-row">
          <input id="produtoBusca" type="text" placeholder="Digite o nome do produto..." />
        </div>
        <div class="actions">
          <button id="btnComparar">Comparar Preços</button>
        </div>
        <hr />
        <div class="links-row">
          <a class="link" href="/paginas/adicionar-produto-preco.html">Adicionar Produto / Preço</a>
        </div>
        <div id="mensagemBusca" class="mensagem"></div>
      </section>

    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>

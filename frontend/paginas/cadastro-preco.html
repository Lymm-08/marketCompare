<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Cadastro Preço</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="../css/estilos.css" /></head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm"><div class="container"><a class="navbar-brand" href="../index.html">Preço Justo</a></div></nav>
<main class="container py-5">
  <div class="card shadow-sm"><div class="card-body">
    <h2>Cadastro de Preço</h2>
    <div id="feedback"></div>
    <form id="form-preco">
      <div class="mb-3"><label class="form-label">Produto</label><select id="produto_id" class="form-select" required><option>Carregando...</option></select></div>
      <div class="mb-3"><label class="form-label">Supermercado</label><select id="mercado_id" class="form-select" required><option>Carregando...</option></select></div>
      <div class="mb-3"><label class="form-label">Valor</label><input id="valor" class="form-control" placeholder="Ex: 24.99" required /></div>
      <div class="mb-3"><label class="form-label">Data do registro</label><input id="data_registro" type="date" class="form-control" required /></div>
      <button class="btn btn-primary" type="submit">Cadastrar</button>
    </form>
  </div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/principal.js"></script>
<script src="../js/criar.js"></script>
</body>
</html>

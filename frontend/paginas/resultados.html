<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resultados - Comparador de Preços</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="app-root">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Resultados da Comparação</h1>
      </div>
    </header>

    <div class="card center-card">
      <h2>Melhores Ofertas Encontradas!</h2>
      <div id="resultadoComparacao" class="resultado-lista">
        <p>Carregando...</p>
      </div>
      <div class="actions-row">
        <a href="./adicionar.html" class="link">Adicionar Novo Produto / Preço</a>
        <a href="./inicio.html" class="secondary">Voltar</a>
      </div>
    </div>
  </main>

<script src="../js/pages_shared.js"></script>
<script>
  function getQueryParam(name) {
    const url = new URL(location.href);
    return url.searchParams.get(name) || '';
  }

  async function init() {
    const nome = getQueryParam('nome').trim();
    const container = document.getElementById('resultadoComparacao');
    if (!nome) {
      container.innerHTML = '<p>Informe o nome do produto na tela inicial.</p>';
      return;
    }

    try {
      const dados = await compararPorNome(nome);
      if (!dados || dados.length === 0) {
        container.innerHTML = '<p>Nenhum preço encontrado para esse produto.</p>';
        return;
      }

      const ul = document.createElement('ul');
      dados.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.loja} - R$ ${Number(item.valor).toFixed(2)}`;
        ul.appendChild(li);
      });

      // calcular economia
      const valores = dados.map(d => Number(d.valor));
      const maior = Math.max(...valores);
      const menor = Math.min(...valores);
      const economia = (maior - menor).toFixed(2);

      container.innerHTML = '';
      container.appendChild(ul);
      const box = document.createElement('div');
      box.className = 'melhor-preco-box';
      box.innerHTML = `<strong>Melhor Preço: ${dados[0].loja} - R$ ${Number(dados[0].valor).toFixed(2)}</strong>`;
      container.appendChild(box);

      const econ = document.createElement('div');
      econ.className = 'economia-box';
      econ.textContent = `Você economiza R$ ${economia} comprando na ${dados[0].loja}!`;
      container.appendChild(econ);
    } catch (err) {
      container.innerHTML = '<p>Erro ao buscar comparação.</p>';
    }
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Cadastro Produto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="../css/estilos.css" /></head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm"><div class="container"><a class="navbar-brand" href="../index.html">Preço Justo</a></div></nav>
<main class="container py-5">
  <div class="card shadow-sm"><div class="card-body">
    <h2>Cadastro de Produto</h2>
    <div id="feedback"></div>
    <form id="form-produto">
      <div class="mb-3"><label class="form-label">Nome</label><input id="nome" class="form-control" required /><div class="invalid-feedback">Informe o nome.</div></div>
      <div class="mb-3"><label class="form-label">Categoria</label><input id="categoria" class="form-control" required /><div class="invalid-feedback">Informe a categoria.</div></div>
      <button class="btn btn-primary" type="submit">Cadastrar</button>
    </form>
  </div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/principal.js"></script>
<script src="../js/criar.js"></script>
</body>
</html>
